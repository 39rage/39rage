<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 MUSIC - Qurage</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-style.css">
</head>
<body>

    <!-- ヘッダー（小ぶりなロゴ） -->
    <header class="app-header">
        <div class="header-inner">
            <div class="app-logo">👾 MUSIC</div>
            <nav class="header-nav">
                <a href="index.html">PATTERN A</a>
            </nav>
        </div>
    </header>

    <!-- メインコンテンツ（スクロール可能） -->
    <main class="app-main">
        
        <!-- アーティストヒーローエリア -->
        <section class="artist-hero">
            <div class="hero-content">
                <img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="hero-img">
                <div class="hero-text">
                    <p class="hero-label">アーティスト</p>
                    <h1 class="hero-name">Qurage</h1>
                    <div class="hero-actions">
                        <button class="btn-primary" onclick="playTrack(0)">再生</button>
                        <button class="btn-secondary" onclick="shufflePlay()">シャッフル</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 最新リリース（一番新しいアルバム） -->
        <section class="app-section">
            <h2 class="section-title">最新リリース</h2>
            <div id="latestRelease" class="latest-card">
                <!-- 自動生成 -->
            </div>
        </section>

        <!-- アルバム一覧（グリッド） -->
        <section class="app-section">
            <h2 class="section-title">アルバム</h2>
            <div class="album-grid" id="albumGrid">
                <!-- music-data.js から自動生成 -->
            </div>
        </section>

        <!-- トップソング（全曲リスト） -->
        <section class="app-section">
            <h2 class="section-title">トップソング</h2>
            <div class="song-list" id="songList">
                <!-- music-data.js から自動生成 -->
            </div>
        </section>

        <!-- UNRELEASED（特別なリスト） -->
        <section class="app-section unreleased-section">
            <h2 class="section-title">UNRELEASED</h2>
            <p class="section-note">制作途中・未配布の楽曲です。よければお聞きください。</p>
            <div class="song-list" id="unreleasedList">
                <!-- music-data.js から自動生成 -->
            </div>
        </section>

        <footer class="app-footer">
            © Qurage. All Rights Reserved.
        </footer>
    </main>

    <!-- 下部固定プレイヤー -->
    <div class="mini-player">
        <div class="player-inner">
            <div class="player-info">
                <img src="" alt="" id="playerArt" class="player-art">
                <div class="player-text">
                    <div id="playerTitle" class="p-title">曲を選択してください</div>
                    <div id="playerAlbum" class="p-album">Qurage</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="p-btn" id="prevBtn">⏮</button>
                <button class="p-btn-play" id="playBtn">▶</button>
                <button class="p-btn" id="nextBtn">⏭</button>
            </div>
            <div class="player-seek-bar">
                <input type="range" id="seekBar" value="0" max="100">
            </div>
        </div>
    </div>

    <script src="music-data.js"></script>
    <script src="b-logic.js"></script>
    <script>
        initApp();
    </script>
</body>
</html>
