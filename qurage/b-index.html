<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👾 MUSIC - Qurage</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-style.css">
</head>
<body class="bright-theme">

    <header class="app-header">
        <div class="header-inner">
            <div class="app-logo">👾 MUSIC</div>
            <nav class="header-nav">
                <a href="index.html">PATTERN A</a>
            </nav>
        </div>
    </header>

    <main class="app-main">
        <section class="artist-hero">
            <div class="hero-content">
                <img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="hero-img">
                <div class="hero-text">
                    <p class="hero-label">アーティスト</p>
                    <h1 class="hero-name">Qurage</h1>
                    <div class="hero-actions">
                        <button class="btn-primary" onclick="playAllTracks()">再生</button>
                        <button class="btn-secondary" onclick="shuffleAllTracks()">シャッフル</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="app-section">
            <h2 class="section-title">DISCOGRAPHY</h2>
            <div class="album-grid" id="albumGrid"></div>
        </section>

        <section class="app-section">
            <h2 class="section-title">ALL TRACKS</h2>
            <div class="song-list" id="songList"></div>
        </section>

        <section class="app-section unreleased-section">
            <h2 class="section-title">UNRELEASED</h2>
            <p class="section-note">制作途中・未配布の楽曲です。これはフリーBGMではありませんが、よければお聞きください。</p>
            <div class="song-list" id="unreleasedList"></div>
        </section>

        <footer class="app-footer">© Qurage. All Rights Reserved.</footer>
    </main>

    <!-- 【スマホ用】全画面プレイヤー -->
    <div id="fullPlayer" class="full-player">
        <button class="close-full-player" id="closeFullPlayer">∨</button>
        <div class="full-player-content">
            <img src="" alt="" id="fullPlayerArt" class="full-p-art">
            <div class="full-p-text">
                <div id="fullPlayerTitle" class="full-p-title">曲を選択してください</div>
                <div id="fullPlayerSub" class="full-p-sub">アーティスト</div>
            </div>
            
            <div class="full-p-seek">
                <input type="range" id="fullSeekBar" value="0" max="100">
                <div class="full-p-time">
                    <span id="fullCurrentTime">0:00</span>
                    <span id="fullDuration">0:00</span>
                </div>
            </div>

            <div class="full-p-controls">
                <button class="icon-btn" onclick="toggleShuffle()">🔀</button>
                <button class="icon-btn" onclick="prevTrack()">⏮</button>
                <button class="full-play-btn" id="fullPlayBtn">▶</button>
                <button class="icon-btn" onclick="nextTrack()">⏭</button>
                <button class="icon-btn" onclick="toggleRepeat()">🔁</button>
            </div>

            <!-- YouTube MUSIC風「再生リスト」タブ -->
            <div class="full-p-tabs">
                <button class="tab-btn active" id="openQueueBtn">再生リスト (キュー)</button>
            </div>
        </div>

        <!-- 全画面用の再生リスト（さらに上にせり出す） -->
        <div id="fullQueue" class="full-queue-drawer">
            <div class="queue-header">次に再生</div>
            <div id="fullQueueList" class="queue-content"></div>
        </div>
    </div>

    <!-- プレイヤーバー（PC & スマホミニ用） -->
    <div class="fixed-player" id="miniPlayer">
        <div class="player-inner">
            
            <!-- 操作（PCのみ表示） -->
            <div class="p-controls pc-only">
                <button class="icon-btn" onclick="toggleShuffle()">🔀</button>
                <button class="icon-btn" onclick="prevTrack()">⏮</button>
                <button class="play-btn" id="playBtn">▶</button>
                <button class="icon-btn" onclick="nextTrack()">⏭</button>
                <button class="icon-btn" onclick="toggleRepeat()">🔁</button>
            </div>

            <!-- 情報（スマホはここをタップで拡大） -->
            <div class="p-center" id="expandTrigger">
                <div class="p-info">
                    <div class="p-art-wrapper">
                        <div id="playerDefaultIcon" class="p-default-icon">👾</div>
                        <img src="" alt="" id="playerArt" class="p-art">
                    </div>
                    <div class="p-text">
                        <div id="playerTitleInfo" class="p-title-line">曲を選択してください</div>
                        <div class="p-description-area" id="marqueeBox">
                            <div id="playerDescMarquee" class="marquee-text">Welcome to 👾 MUSIC</div>
                        </div>
                    </div>
                </div>
                <div class="p-seek-wrapper pc-only">
                    <span id="currentTime" class="time-label">0:00</span>
                    <input type="range" id="seekBar" value="0" max="100">
                    <span id="duration" class="time-label">0:00</span>
                </div>
            </div>

            <!-- ツール -->
            <div class="p-tools">
                <button class="icon-btn mobile-expand-btn">^</button>
                <button class="icon-btn pc-only" id="queueBtn">📑</button>
                <div class="volume-tool pc-only">
                    <button class="icon-btn" id="volumeBtn">🔈</button>
                    <div id="volumePopup" class="volume-popup">
                        <input type="range" id="volumeBar" value="80" max="100" orient="vertical">
                    </div>
                </div>
                <a href="#" target="_blank" id="boothLink" class="icon-btn download-btn pc-only">⬇️</a>
            </div>
        </div>
    </div>

    <script src="music-data.js"></script>
    <script src="b-logic.js"></script>
    <script>initApp();</script>
</body>
</html>
