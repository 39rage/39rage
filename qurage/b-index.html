<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurage Music - SELECT MUSIC (B)</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-style.css">
</head>
<body class="bright-theme">
    <div id="header-part"></div>

    <main class="game-container">
        <!-- 左：カテゴリー -->
        <aside class="category-selector" id="sidebar-part"></aside>

        <!-- 中：無限横スクロール ＆ アルバム詳細 -->
        <section class="music-selection">
            <div class="carousel-viewport" id="albumCarousel">
                <!-- 無限の輪が生成されます -->
            </div>
            
            <div class="album-info-display" id="albumDetail">
                <!-- 曲名・説明・BOOTHボタン -->
            </div>
        </section>

        <!-- 右：共通プレイヤー -->
        <section class="col-right" id="player-part"></section>
    </main>

    <footer class="game-footer">
        © Qurage. All Rights Reserved.
    </footer>

    <script src="music-data.js"></script>
    <script src="shared-components.js"></script>
    <script src="b-logic.js"></script>
    <script>
        initGamePage();
    </script>
</body>
</html>
