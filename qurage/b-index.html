<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurage Music - SELECT MUSIC (B)</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-style.css">
</head>
<body class="bright-theme">
    <div id="header-part"></div>

    <main class="game-container">
        <!-- 左：カテゴリー -->
        <aside class="category-selector">
            <button class="cat-btn active" onclick="changeCategory('discography', this)">
                <span class="cat-icon">💿</span>
                <span class="cat-name">DISCOGRAPHY</span>
            </button>
            <button class="cat-btn" onclick="changeCategory('unreleased', this)">
                <span class="cat-icon">👾</span>
                <span class="cat-name">UNRELEASED</span>
            </button>
        </aside>

        <!-- 中：ジャケ写ぐるぐる ＆ アルバム情報 -->
        <section class="music-selection">
            <div class="carousel-container" id="albumCarousel">
                <!-- ジャケ写がここに並びます -->
            </div>
            
            <div class="album-info-display" id="albumDetail">
                <!-- アルバム名・説明・BOOTHボタンがここに出ます -->
            </div>
        </section>

        <!-- 右：パターンAのプレイヤー ＆ 曲リスト -->
        <section class="col-right" id="player-part">
            <!-- shared-components.js の renderPlayerPart で生成されます -->
        </section>
    </main>

    <footer class="game-footer">
        © Qurage. All Rights Reserved.
    </footer>

    <script src="music-data.js"></script>
    <script src="shared-components.js"></script>
    <script src="b-logic.js"></script>
    <script>
        // パターンB用の初期化
        initGamePage();
    </script>
</body>
</html>
