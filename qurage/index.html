<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qurage Music - First step</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { color: #555; margin-bottom: 30px; }
        .album-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .album-art {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .album-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .track-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }
        .track-item {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .track-item:last-child { border-bottom: none; }
        .track-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .track-name { font-weight: 500; }
        .track-meta { font-size: 0.8rem; color: #888; }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

    <h1>👾 Qurage Music</h1>

    <div class="album-container">
        <img src="https://fromtheasia.com/wp-content/uploads/NCG63.jpg" alt="First step Album Art" class="album-art">
        
        <div class="album-title">Album: First step</div>
        
        <ul class="track-list">
            <li class="track-item">
                <div class="track-info">
                    <span class="track-name">01. British Brixton</span>
                    <span class="track-meta">BPM: 100 / Key: C</span>
                </div>
                <audio controls src="audio/2020102923 British_Brixton-100_C.mp3"></audio>
            </li>

            <li class="track-item">
                <div class="track-info">
                    <span class="track-name">02. Accelerate Afghanistan</span>
                    <span class="track-meta">BPM: 102 / Key: Cm</span>
                </div>
                <audio controls src="audio/2020103012 Accelerate_Afghanistan_TH-102_Cm.mp3"></audio>
            </li>

            <li class="track-item">
                <div class="track-info">
                    <span class="track-name">03. AABS 80s</span>
                    <span class="track-meta">BPM: 128 / Key: Cm</span>
                </div>
                <audio controls src="audio/2020103014 AABS_80s-128_Cm.mp3"></audio>
            </li>

            <li class="track-item">
                <div class="track-info">
                    <span class="track-name">04. Altered Afterburner AYB</span>
                    <span class="track-meta">BPM: 129 / Key: C#m</span>
                </div>
                <audio controls src="audio/2020103018 Altered_Afterburner_AYB-129_C#m.mp3"></audio>
            </li>

            <li class="track-item">
                <div class="track-info">
                    <span class="track-name">05. Alternating synth layers</span>
                    <span class="track-meta">BPM: 125 / Key: Dm</span>
                </div>
                <audio controls src="audio/2020103111 Alternating_synth_layers-125_Dm.mp3"></audio>
            </li>
        </ul>
    </div>

</body>
</html>
