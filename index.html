<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Page</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/6410224d7e21cc6e2a9eb0cf659e7eb4.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Qurage: White & Orange */
            --qurage-main: #ff8c00;
            --qurage-sub: #ffffff;
            /* 39rage: Light Blue Only */
            --sakurage-main: #00d4ff;
            --sakurage-sub: #00d4ff;
            /* Sacra: Lavender */
            --sacra-main: #e6e6fa;
            --sacra-sub: #9370db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* タイトルエリア（より情緒的なフレーズに） */
        .title-area {
            text-align: center;
            padding: 60px 20px;
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .title-area h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }
        .title-area p {
            font-size: 0.65rem;
            color: #aaa;
            letter-spacing: 0.3em;
            font-weight: 300;
        }

        .select-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .panel-bg {
            position: absolute;
            inset: 0;
            background-size: cover !important;
            background-position: center !important;
            transition: transform 1.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
        }

        .panel-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7); /* 少し明るくして画像を見えやすく */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.7s ease;
            z-index: 2;
        }

        /* ホバー時の変化 */
        .panel:hover { flex: 2; }
        .panel:hover .panel-bg { transform: scale(1.1); }
        .panel:hover .panel-overlay { 
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }

        /* パネル中央のコンテンツ背景（文字を読みやすくするための影） */
        .panel-content {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, transparent 70%);
            padding: 40px 0;
        }

        .name {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
            text-transform: uppercase;
            /* 文字の視認性を極限まで高めるシャドウ */
            text-shadow: 0 0 30px rgba(0,0,0,1), 0 4px 10px rgba(0,0,0,1);
        }

        .desc {
            display: inline-block;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            font-weight: 700;
            padding: 6px 16px;
            border: 1.5px solid;
            border-radius: 3px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
            background: rgba(0,0,0,0.3);
        }

        /* 各名義のカラー設定 */

        /* 1. Qurage (Orange & White) */
        .panel.qurage:hover { box-shadow: inset 0 0 120px rgba(255, 140, 0, 0.5); }
        .panel.qurage .name { color: var(--qurage-sub); }
        .panel.qurage .desc { border-color: var(--qurage-main); color: var(--qurage-main); }
        .panel.qurage .view-chip { background: var(--qurage-main); color: #000; }

        /* 2. 39rage (Light Blue Only) */
        .panel.sakurage:hover { box-shadow: inset 0 0 120px rgba(0, 212, 255, 0.5); }
        .panel.sakurage .name { color: var(--sakurage-main); }
        .panel.sakurage .desc { border-color: var(--sakurage-main); color: var(--sakurage-main); }
        .panel.sakurage .view-chip { background: var(--sakurage-main); color: #000; }

        /* 3. Sacra (Lavender) */
        .panel.sakura:hover { box-shadow: inset 0 0 120px rgba(147, 112, 219, 0.4); }
        .panel.sakura .name { color: var(--sacra-main); }
        .panel.sakura .desc { border-color: var(--sacra-sub); color: var(--sacra-sub); }
        .panel.sakura .view-chip { background: var(--sacra-sub); color: #fff; }

        /* VIEW SITE チップ */
        .view-chip {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 6px 20px;
            border-radius: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .panel:hover .view-chip {
            opacity: 1;
            transform: translateY(0);
        }

        /* 背景画像 */
        .panel.qurage .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG292.jpg'); }
        .panel.sakurage .panel-bg { background: url('https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png'); }
        .panel.sakura .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG144.jpg'); }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .select-container { flex-direction: column; }
            .panel { border-bottom: 1px solid rgba(255,255,255,0.1); }
            .panel:hover { flex: 1; }
            .panel-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
            .title-area { position: relative; padding: 40px 20px; }
            .name { font-size: 2.5rem; }
            .view-chip { opacity: 0.9; transform: none; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>WHICH PERSONA?</h1>
        <p>THREE FACETS, ONE SOUL</p>
    </div>

    <div class="select-container">
        
        <!-- Qurage -->
        <a href="qurage/index.html" class="panel qurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Qurage</div>
                <div class="desc">BGM ARCHIVE</div><br>
                <div class="view-chip">ENTER 👾</div>
            </div>
        </a>

        <!-- 39rage -->
        <a href="39rage/index.html" class="panel sakurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">39rage</div>
                <div class="desc">MIX & VIDEO EDIT</div><br>
                <div class="view-chip">ENTER 🪼</div>
            </div>
        </a>

        <!-- Sacra -->
        <a href="https://3939-sacra.carrd.co/" class="panel sakura" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Sacra</div>
                <div class="desc">VOCALIST</div><br>
                <div class="view-chip">ENTER 🌸</div>
            </div>
        </a>

    </div>

</body>
</html>
