<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Page</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/6410224d7e21cc6e2a9eb0cf659e7eb4.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --qurage-main: #ff8c00;
            --sakurage-main: #00d4ff;
            --sacra-main: #9370db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 画面からはみ出さないための絶対条件 */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden; 
            background-color: #000;
            color: #fff;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* タイトルエリア：PCは浮かせ、スマホは上部に固定 */
        .title-area {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .title-area h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* コンテナを100%の高さで3分割 */
        .select-container {
            display: flex;
            width: 100%;
            flex: 1; /* 残りの高さをすべて使う */
            position: relative;
            z-index: 1;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .panel-bg {
            position: absolute;
            inset: 0;
            background-size: cover !important;
            background-position: center !important;
            transition: transform 1.5s ease;
            z-index: 1;
        }

        .panel-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65); /* 暗めにして文字を浮き立たせる */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.7s ease;
            z-index: 2;
        }

        /* ホバー：PCのみ */
        @media (min-width: 769px) {
            .panel:hover { flex: 2; }
            .panel:hover .panel-bg { transform: scale(1.1); }
            .panel:hover .panel-overlay { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(0px); }
        }

        .panel-content {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .name {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: #ffffff;
            /* 文字周りの影を強くして視認性UP */
            text-shadow: 0 0 20px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,1);
        }

        .desc {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            font-weight: 900;
            padding: 6px 18px;
            border-radius: 50px;
            color: #fff;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* 各名義のカラー */
        .panel.qurage .desc { background-color: var(--qurage-main); }
        .panel.sakurage .desc { background-color: var(--sakurage-main); }
        .panel.sakura .desc { background-color: var(--sacra-main); }

        /* 背景画像 */
        .panel.qurage .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG292.jpg'); }
        .panel.sakurage .panel-bg { background: url('https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png'); }
        .panel.sakura .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG144.jpg'); }

        /* スマホ専用修正：縦に3等分して1画面に収める */
        @media (max-width: 768px) {
            .select-container { flex-direction: column; }
            .panel { 
                border-bottom: 1px solid rgba(255,255,255,0.1);
                /* Sacra（一番下）が隠れないように調整 */
                padding-bottom: env(safe-area-inset-bottom);
            }
            .title-area { 
                position: relative; 
                padding: 30px 10px 10px; 
                background: #000;
            }
            .title-area h1 { font-size: 0.8rem; letter-spacing: 0.3em; }
            .name { font-size: 1.8rem; margin-bottom: 5px; }
            .desc { font-size: 0.6rem; padding: 4px 15px; }
            .panel-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>WHICH PERSONA?</h1>
    </div>

    <div class="select-container">
        <!-- Qurage -->
        <a href="qurage/index.html" class="panel qurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Qurage</div>
                <div class="desc">BGM ARCHIVE</div>
            </div>
        </a>

        <!-- 39rage -->
        <a href="39rage/index.html" class="panel sakurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">39rage</div>
                <div class="desc">MIX & VIDEO EDIT</div>
            </div>
        </a>

        <!-- Sacra -->
        <a href="https://3939-sacra.carrd.co/" class="panel sakura" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Sacra</div>
                <div class="desc">VOCALIST</div>
            </div>
        </a>
    </div>

</body>
</html>
