<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage Portal</title>
    <!-- ファビコン設定 -->
    <link rel="icon" href="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #050b14;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* タイトルエリア */
        .title-area {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #050b14, transparent);
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 10;
        }
        .title-area h1 {
            color: #ffffff;
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .title-area p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 5px;
            letter-spacing: 0.1em;
        }

        /* セレクトコンテナ（3分割） */
        .select-container {
            flex: 1;
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 各名義の共通スタイル */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            padding: 20px;
            background-size: cover !important; /* 画像を画面いっぱいにカバー */
            background-position: center !important; /* 画像を中央寄せ */
        }

        /* ホバーしたパネルを広げる（主人公選択感） */
        .panel:hover {
            flex: 1.6; /* 広がりを少しだけ強調してよりダイナミックに */
        }

        /* 背景のオーバーレイ（初期状態は暗めにして文字を読みやすく、ホバーで画像を引き立たせる） */
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(5, 11, 20, 0.65); /* 暗めのマスク */
            transition: background 0.4s ease;
            z-index: 1;
        }
        .panel:hover::before {
            background: rgba(5, 11, 20, 0.25); /* ホバーすると画像がパッと明るくなる */
        }

        .panel-content {
            position: relative;
            z-index: 2;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .panel:hover .panel-content {
            transform: scale(1.1); /* 文字も少しだけ大きく */
        }

        .name {
            font-size: 2.4rem; /* 視認性を上げるために少しサイズアップ */
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
        }
        .desc {
            font-size: 0.95rem;
            color: #f1f5f9;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        /* ーーー 各パネルの個別背景＆境界線設定 ーーー */

        /* 1. Qurage （左：深海） */
        .panel.qurage {
            background: url('https://fromtheasia.com/wp-content/uploads/NCG292.jpg') no-repeat;
        }
        .panel.qurage .name { color: #38bdf8; } /* サイバーな水色テキスト */

        /* 2. 39rage （中央：メイン） */
        .panel.sakurage {
            background: url('https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png') no-repeat;
            border-left: 1px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.15);
        }
        .panel.sakurage .name { color: #ffffff; }

        /* 3. Sacra （右：過去名義） */
        .panel.sakura {
            background: url('https://fromtheasia.com/wp-content/uploads/NCG144.jpg') no-repeat;
        }
        .panel.dark-pink .name { color: #f472b6; } /* 華やかなピンクテキスト */

        /* スマホ対応（縦並びにする） */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .title-area { position: relative; padding: 40px 20px 20px 20px; }
            .select-container { flex-direction: column; height: 750px; } /* スマホでも画像が見やすいよう少し高さを確保 */
            .panel { border: none !important; }
            .panel:hover { flex: 1; }
            .name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>CHOOSE YOUR CHARACTER</h1>
        <p>名義を選択して各コンテンツへ移動します</p>
    </div>

    <div class="select-container">
        
        <!-- ① Qurage（左） -->
        <a href="https://casbgcasbg.booth.pm/" class="panel qurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-content">
                <div class="name">Qurage</div>
                <div class="desc">Free BGM & Track Maker ↗</div>
            </div>
        </a>

        <!-- ② 39rage（中央） -->
        <!-- 元のコードの「39rage/index.html」のままでも、「about.html」へ直接飛ばす形でもどちらでも対応可能です -->
        <a href="about.html" class="panel sakurage">
            <div class="panel-content">
                <div class="name">39rage</div>
                <div class="desc">Vocaloid & Movie お手伝い</div>
            </div>
        </a>

        <!-- ③ Sacra（右） -->
        <!-- 元のコードの「外部リンク」から「works.html」へ行くようにしています。元に戻すこともすぐ可能です！ -->
        <a href="works.html" class="panel sakura">
            <div class="panel-content">
                <div class="name">Sacra</div>
                <div class="desc">Past Works & Vocal</div>
            </div>
        </a>

    </div>

</body>
</html>
