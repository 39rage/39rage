<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage - Portal</title>
    <!-- ファビコン設定 -->
    <link rel="icon" href="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #e0f2fe; color: #0f172a;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* 画面中央に配置するためのコンテナ */
        .portal-wrapper {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 90%; max-width: 1000px; margin: 0 auto;
            padding: 60px 0; box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem; font-weight: 700; letter-spacing: 0.15em;
            margin: 0 0 60px 0; text-align: center;
        }

        /* かっこいいグリッドレイアウト */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px; width: 100%;
        }

        /* シャープで洗練されたカードデザイン */
        .portal-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: #0f172a;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
            display: flex; flex-direction: column;
        }

        /* 画像は四角ベース（上部だけ角丸）でスタイリッシュに */
        .portal-image-wrapper {
            width: 100%; padding-top: 100%; /* 1:1の正方形 */
            position: relative; overflow: hidden;
            background-color: #f8fafc;
        }
        .portal-avatar {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* テキストエリア */
        .portal-info {
            padding: 25px 20px; text-align: center;
            border-top: 1px solid #f1f5f9;
        }

        .portal-name {
            font-size: 1.25rem; font-weight: 700; letter-spacing: 0.08em;
            margin: 0;
        }

        .portal-desc {
            font-size: 0.8rem; color: #64748b; letter-spacing: 0.05em;
            margin: 8px 0 0 0; font-weight: bold;
        }

        /* ホバー時の洗練されたエフェクト（上に浮き上がり、画像が少し拡大） */
        .portal-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 35px rgba(15, 23, 42, 0.1);
        }
        .portal-card:hover .portal-avatar {
            transform: scale(1.05);
        }

        /* 中央揃えフッター */
        footer {
            padding: 30px 40px; text-align: center;
            font-size: 0.75rem; color: #64748b; letter-spacing: 0.1em;
        }

        /* スマホ表示対応（縦一列に美しく並べる） */
        @media (max-width: 768px) {
            .portal-wrapper { padding: 40px 0; }
            h1 { font-size: 2rem; margin-bottom: 40px; }
            .portal-grid { grid-template-columns: 1fr; max-width: 320px; gap: 25px; }
            .portal-info { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="portal-wrapper">
        <h1>39rage</h1>
        
        <div class="portal-grid">
            
            <!-- ① Qurage -->
            <a href="https://casbgcasbg.booth.pm/" class="portal-card" target="_blank" rel="noopener noreferrer">
                <div class="portal-image-wrapper">
                    <img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="portal-avatar">
                </div>
                <div class="portal-info">
                    <div class="portal-name">Qurage</div>
                    <div class="portal-desc">SOUND / BGM</div>
                </div>
            </a>

            <!-- ② 39rage -->
            <a href="about.html" class="portal-card">
                <div class="portal-image-wrapper">
                    <img src="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" alt="39rage" class="portal-avatar">
                </div>
                <div class="portal-info">
                    <div class="portal-name">39rage</div>
                    <div class="portal-desc">PORTFOLIO</div>
                </div>
            </a>

            <!-- ③ Sacra -->
            <a href="works.html" class="portal-card">
                <div class="portal-image-wrapper">
                    <img src="https://fromtheasia.com/wp-content/uploads/NCG144.jpg" alt="Sacra" class="portal-avatar">
                </div>
                <div class="portal-info">
                    <div class="portal-name">Sacra</div>
                    <div class="portal-desc">VOCAL / MIX</div>
                </div>
            </a>

        </div>
    </div>

    <footer>
        © 39rage. Powered by GitHub Pages.
    </footer>

</body>
</html>
